 set -g prefix C-q
 unbind C-b
 unbind Space

bind r source-file ~/.tmux.conf

# セッション移動
bind [ switch-client -p
bind ] switch-client -n

# プレフィックスキー+^でペインを垂直分割する
bind ^ split-window -h

# プレフィックスキー+-でペインを水平分割する
bind - split-window -v

# prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Alt(Option) + h/j/k/l（prefix不要）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ウィンドウ番号を1始まりにする
set -g base-index 1
set -g pane-base-index 1

# コピーモードをvim操作にする
set -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 256色モードを有効化
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# ステータスバー（2段）
set -g status 2
set -g status-position top

# セッション・ウィンドウの変化時にステータスバーを即時更新
set-hook -g session-created "refresh-client -S"
set-hook -g session-closed "refresh-client -S"
set-hook -g session-renamed "refresh-client -S"
set-hook -g window-linked "refresh-client -S"
set-hook -g window-unlinked "refresh-client -S"
set-hook -g window-renamed "refresh-client -S"

# ステータスバーのデフォルトスタイル
set -g status-style bg=colour234,fg=colour250

# 上段: セッション一覧（現在のセッションをハイライト）
set -g status-format[0] '#[bg=colour234] #[fg=colour39,bold]#{session_name}#[default] #[fg=colour240]#(tmux list-sessions -F "##{session_name}" 2>/dev/null | grep -v "^#{session_name}$" | tr "\n" " ")#[default]'

# 下段: ウィンドウ一覧 + gitブランチ
set -g status-format[1] '#[bg=colour235,fg=colour250] #{W:#{?window_active,#[fg=colour39 bold bg=colour238] #I:#W #[default], #[fg=colour240]#I:#W }}'

# Ctrl+q → b でステータスバーの表示/非表示トグル
bind b if -F '#{==:#{status},2}' 'set -g status off' 'set -g status 2'

# マウス操作を有効化
set-option -g mouse on

# TPM (自動インストール)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
